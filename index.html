<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ESTEPARIO AUSTRAL — Archive Terminal</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="loader" class="loader">
    <div class="brand">
      <div class="name">ESTEPARIO AUSTRAL</div>
      <div class="sub">ARCHIVE TERMINAL</div>
    </div>
    <div class="dots" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>
  </div>

  <main id="app" class="app hidden" role="main">
    <header class="header">
      <div class="title">ESTEPARIO AUSTRAL</div>
      <div class="subtitle">ARCHIVE TERMINAL</div>
    </header>

    <section class="controls">
      <input id="search" type="search" placeholder="Buscar archivos..." aria-label="Buscar canciones" />
      <div id="status" class="status" aria-live="polite"></div>
    </section>

    <section id="archive" class="archive" aria-live="polite"></section>
  </main>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
